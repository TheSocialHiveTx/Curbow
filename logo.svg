<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="100%" height="100%">
  <defs>
    <!-- Path for the top text (CONSTRUCTION) - arcs clockwise along the top -->
    <path id="textPathTop" d="M 36,100 A 64,64 0 0,1 164,100" fill="none" />
    <!-- Path for the bottom text (& DEVELOPMENT) - arcs counter-clockwise along the bottom -->
    <path id="textPathBottom" d="M 36,100 A 64,64 0 0,0 164,100" fill="none" />
  </defs>

  <!-- Background color (can be customized or styled via CSS) -->
  <rect width="200" height="200" fill="none" />

  <g fill="none" stroke="#3d3935" stroke-linecap="round" stroke-linejoin="round">
    <!-- Outer thick circle -->
    <circle cx="100" cy="100" r="92" stroke-width="4" />
    
    <!-- Inner thin circle -->
    <circle cx="100" cy="100" r="84" stroke-width="1.5" />
    
    <!-- Inner circle behind the text -->
    <circle cx="100" cy="100" r="48" stroke-width="1.5" />

    <!-- Double horizontal bars extending to the outer circle -->
    <!-- Top bar -->
    <line x1="16" y1="78" x2="184" y2="78" stroke-width="3" />
    <!-- Bottom bar -->
    <line x1="16" y1="122" x2="184" y2="122" stroke-width="3" />
  </g>

  <!-- Curved Text Elements -->
  <text font-family="'Outfit', 'Inter', 'Helvetica Neue', sans-serif" font-weight="800" font-size="13" fill="#3d3935" letter-spacing="3.5">
    <textPath href="#textPathTop" startOffset="50%" text-anchor="middle">CONSTRUCTION</textPath>
  </text>

  <text font-family="'Outfit', 'Inter', 'Helvetica Neue', sans-serif" font-weight="800" font-size="11.5" fill="#3d3935" letter-spacing="3">
    <textPath href="#textPathBottom" startOffset="50%" text-anchor="middle">&amp; DEVELOPMENT</textPath>
  </text>

  <!-- Center bold company name -->
  <text x="100" y="112" font-family="'Outfit', 'Roboto Slab', 'Rockwell', 'Georgia', serif" font-weight="900" font-size="34" fill="#3d3935" text-anchor="middle" letter-spacing="1">CURBOW</text>
</svg>
